<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>crochetie Dino - Handmade Store</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com">
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- Firebase SDK v10 Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js">
    </script>

    <!-- React & Babel CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.21.4/babel.min.js">
    </script>

    <style>
        .font-brand {
            font-family: 'Alex Brush', cursive;
        }
        .font-editorial {
            font-family: 'Cormorant Garamond', serif;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FAF7F2;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #FAF7F2;
        }
        ::-webkit-scrollbar-thumb {
            background: #E6DFD5;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #D1C7B7;
        }
        .animate-fadeIn {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .logo-img {
            max-height: 48px;
            width: auto;
            object-fit: contain;
        }
        @media (max-width: 640px) {
            .logo-img {
                max-height: 36px;
            }
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col">

    <div id="root" class="flex-grow flex flex-col">
        <div class="flex-grow flex flex-col items-center justify-center p-8 text-center">
            <div class="animate-pulse space-y-6">
                <h1 class="font-brand text-5xl text-gray-800">crochetie Dino</h1>
                <p class="font-editorial italic text-xl text-gray-500">Curating handwoven warmth...</p>
                <div class="w-16 h-[2px] bg-[#8E806A] mx-auto animate-bounce"></div>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyCtIpcH3mkUGalHLyQbq7mJYDn_5Vo6YXI",
            authDomain: "crochet-dino.firebaseapp.com",
            projectId: "crochet-dino",
            storageBucket: "crochet-dino.firebasestorage.app",
            messagingSenderId: "702656152106",
            appId: "1:702656152106:web:3a89f21bf983f7a90af953",
            measurementId: "G-M7GKBXN1RL"
        };

        const VERCEL_APP_ID = "crochet-by-dino-production";

        const getActiveAppId = () => {
            if (typeof __app_id !== 'undefined' && __app_id) return __app_id;
            return VERCEL_APP_ID;
        };

        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // Admin emails list - centralized for easy management
        const ADMIN_EMAILS = [
            "hassan7534.j@gmail.com",
            "laibajavedziz@gmail.com",
            "laibajavedaziz@gmail.com"
        ];

        // Admin credentials mapping
        const ADMIN_CREDENTIALS = {
            "hassan7534.j@gmail.com": "hassan7534@",
            "laibajavedziz@gmail.com": "ilovepakistanyeay",
            "laibajavedaziz@gmail.com": "ilovepakistanyeay"
        };

        function App() {
            // --- FIREBASE ---
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);
            const [currentUser, setCurrentUser] = useState(null);

            // --- APP STATE ---
            const [products, setProducts] = useState([]);
            const [orders, setOrders] = useState([]);
            const [cart, setCart] = useState([]);
            const [currentView, setCurrentView] = useState('storefront');
            const [selectedCategory, setSelectedCategory] = useState('all');
            const [searchQuery, setSearchQuery] = useState('');
            const [logoUrl, setLogoUrl] = useState('');

            // --- MODALS ---
            const [alertModal, setAlertModal] = useState({ show: false, title: '', message: '', type: 'info' });
            const [authModal, setAuthModal] = useState({ show: false, email: '', password: '', isLogin: true });
            const [checkoutModal, setCheckoutModal] = useState({
                show: false,
                name: '',
                phone: '',
                address: '',
                city: 'Karachi',
                notes: '',
                verificationCode: '',
                enteredCode: '',
                isVerified: false,
                isCodeSent: false
            });
            const [productFormModal, setProductFormModal] = useState({
                show: false,
                id: null,
                title: '',
                description: '',
                price: '',
                category: 'keychain',
                image: ''
            });
            const [logoModal, setLogoModal] = useState({ show: false, url: '' });

            // --- STATS ---
            const [totalSales, setTotalSales] = useState(0);

            // --- ALERT ---
            const showAlert = useCallback((title, message, type = 'info') => {
                setAlertModal({ show: true, title, message, type });
            }, []);

            const closeAlert = useCallback(() => {
                setAlertModal({ show: false, title: '', message: '', type: 'info' });
            }, []);

            // Check if a user is an admin
            const isAdminUser = useCallback((user) => {
                if (!user || !user.email) return false;
                return ADMIN_EMAILS.includes(user.email);
            }, []);

            // --- FIREBASE INIT ---
            useEffect(() => {
                try {
                    if (window.firebase) {
                        let appInstance;
                        if (window.firebase.apps.length === 0) {
                            appInstance = window.firebase.initializeApp(firebaseConfig);
                        } else {
                            appInstance = window.firebase.app();
                        }
                        const dbInstance = window.firebase.firestore(appInstance);
                        const authInstance = window.firebase.auth(appInstance);

                        setDb(dbInstance);
                        setAuth(authInstance);

                        authInstance.onAuthStateChanged((user) => {
                            if (user) {
                                const isAdmin = isAdminUser(user);
                                if (!isAdmin && !user.emailVerified) {
                                    setCurrentUser(null);
                                    showAlert("Email Not Verified",
                                        "Please verify your email address before logging in. Check your inbox for the verification link.",
                                        "error");
                                    authInstance.signOut();
                                    return;
                                }
                                setCurrentUser(user);
                            } else {
                                setCurrentUser(null);
                            }
                        });
                    } else {
                        console.warn("Firebase not loaded. Running in local memory mode.");
                    }
                } catch (error) {
                    console.error("Firebase Init Error: ", error);
                }
            }, [showAlert, isAdminUser]);

            // --- LIVE LISTENERS: PRODUCTS, ORDERS, LOGO ---
            useEffect(() => {
                if (!db) return;
                const appId = getActiveAppId();

                // Products
                const productsRef = db.collection('artifacts').doc(appId).collection('public').doc('data')
                    .collection('products');
                const unsubProducts = productsRef.onSnapshot(
                    (snap) => {
                        const list = [];
                        snap.forEach((d) => {
                            const data = d.data();
                            if (data) list.push({ id: d.id, ...data });
                        });
                        setProducts(list);
                    },
                    (err) => console.error("Products listener error:", err)
                );

                // Orders
                const ordersRef = db.collection('artifacts').doc(appId).collection('public').doc('data')
                    .collection('orders');
                const unsubOrders = ordersRef.onSnapshot(
                    (snap) => {
                        const list = [];
                        let sales = 0;
                        snap.forEach((d) => {
                            const data = d.data();
                            if (data) {
                                const item = { id: d.id, ...data };
                                list.push(item);
                                if (item.status === 'delivered') {
                                    sales += Number(item.total || 0);
                                }
                            }
                        });
                        setOrders(list);
                        setTotalSales(sales);
                    },
                    (err) => console.error("Orders listener error:", err)
                );

                // Logo / Settings
                const settingsRef = db.collection('artifacts').doc(appId).collection('public').doc('data');
                const unsubSettings = settingsRef.onSnapshot(
                    (docSnap) => {
                        if (docSnap.exists) {
                            const data = docSnap.data();
                            if (data && data.logoUrl) {
                                setLogoUrl(data.logoUrl);
                            } else {
                                setLogoUrl('');
                            }
                        } else {
                            setLogoUrl('');
                        }
                    },
                    (err) => console.error("Settings listener error:", err)
                );

                return () => {
                    unsubProducts();
                    unsubOrders();
                    unsubSettings();
                };
            }, [db]);

            // --- AUTH HANDLERS ---
            const handleAdminLogin = async (e) => {
                e.preventDefault();
                const email = authModal.email.trim();
                const password = authModal.password;

                // Check if this is a known admin with hardcoded credentials
                if (ADMIN_CREDENTIALS[email] && ADMIN_CREDENTIALS[email] === password) {
                    const displayName = email === "hassan7534.j@gmail.com" ? "Hassan (Owner)" :
                                       email === "laibajavedziz@gmail.com" ? "Laiba (Admin)" :
                                       email === "laibajavedaziz@gmail.com" ? "Laiba (Admin)" :
                                       "Admin";
                    setCurrentUser({ email, displayName, uid: "admin-" + Date.now(), emailVerified: true });
                    setAuthModal({ ...authModal, show: false, email: '', password: '' });
                    setCurrentView('admin');
                    showAlert(`Welcome ${displayName}!`, "You have accessed the administrative portal.", "success");
                    return;
                }

                if (auth) {
                    try {
                        if (authModal.isLogin) {
                            const cred = await auth.signInWithEmailAndPassword(email, password);
                            if (!cred.user.emailVerified) {
                                await auth.signOut();
                                showAlert("Email Not Verified",
                                    "Please verify your email before logging in. Check your inbox.", "error");
                                return;
                            }
                            setCurrentUser(cred.user);
                        } else {
                            const cred = await auth.createUserWithEmailAndPassword(email, password);
                            await cred.user.sendEmailVerification();
                            await auth.signOut();
                            showAlert("Verification Email Sent",
                                "A verification link has been sent to your email. Please verify before logging in.",
                                "success");
                            setAuthModal({ ...authModal, show: false, email: '', password: '' });
                            return;
                        }
                        setAuthModal({ ...authModal, show: false, email: '', password: '' });
                        showAlert("Account Accessed", "Logged in successfully.", "success");
                    } catch (err) {
                        showAlert("Authentication Error", err.message, "error");
                    }
                } else {
                    showAlert("Local Mode", "Firebase is initializing. Please try again.", "info");
                }
            };

            const handleGoogleSignIn = async () => {
                if (auth) {
                    try {
                        const provider = new window.firebase.auth.GoogleAuthProvider();
                        const cred = await auth.signInWithPopup(provider);
                        if (!cred.user.emailVerified) {
                            await auth.signOut();
                            showAlert("Email Not Verified", "Please verify your email before logging in.", "error");
                            return;
                        }
                        setAuthModal({ ...authModal, show: false });
                        showAlert("Google Login Success", "Logged in successfully.", "success");
                    } catch (err) {
                        showAlert("Google Login Error", err.message, "error");
                    }
                } else {
                    showAlert("Not Configured", "Google Login is not configured yet.", "info");
                }
            };

            const handleLogout = () => {
                if (auth) auth.signOut().catch(() => {});
                setCurrentUser(null);
                setCurrentView('storefront');
                showAlert("Goodbye!", "Signed out successfully.", "info");
            };

            // --- CART ---
            const addToCart = useCallback((product) => {
                setCart((prev) => {
                    const existing = prev.find((item) => item.id === product.id);
                    if (existing) {
                        return prev.map((item) =>
                            item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item
                        );
                    }
                    return [...prev, { ...product, quantity: 1, customNote: '' }];
                });
                showAlert("Added to Cart", `${product.title} has been added to your bag.`, "success");
            }, [showAlert]);

            const removeFromCart = useCallback((id) => {
                setCart((prev) => prev.filter((item) => item.id !== id));
            }, []);

            const updateQuantity = useCallback((id, newQty) => {
                if (newQty <= 0) {
                    removeFromCart(id);
                } else {
                    setCart((prev) =>
                        prev.map((item) => (item.id === id ? { ...item, quantity: newQty } : item))
                    );
                }
            }, [removeFromCart]);

            const updateCustomNote = useCallback((id, note) => {
                setCart((prev) =>
                    prev.map((item) => (item.id === id ? { ...item, customNote: note } : item))
                );
            }, []);

            const getCartTotal = useMemo(() => {
                return cart.reduce((acc, item) => acc + Number(item.price) * item.quantity, 0);
            }, [cart]);

            // --- CHECKOUT ---
            const handleSendVerificationCode = () => {
                if (!checkoutModal.phone.match(/^(03|0092|\+92)[0-9]{9,10}$/)) {
                    showAlert("Invalid Phone Number", "Please provide a valid Pakistani contact number.", "error");
                    return;
                }
                const code = Math.floor(1000 + Math.random() * 9000).toString();
                setCheckoutModal((prev) => ({ ...prev, verificationCode: code, isCodeSent: true }));
                showAlert("OTP Code Sent!", `Your verification code is: ${code}`, "success");
            };

            const handleVerifyAndSubmitOrder = async (e) => {
                e.preventDefault();
                if (checkoutModal.enteredCode !== checkoutModal.verificationCode) {
                    showAlert("Verification Error", "The code you entered is incorrect.", "error");
                    return;
                }

                const orderId = "DINO-PK-" + Math.floor(100000 + Math.random() * 900000);
                const orderData = {
                    id: orderId,
                    name: checkoutModal.name,
                    phone: checkoutModal.phone,
                    address: checkoutModal.address,
                    city: checkoutModal.city,
                    notes: checkoutModal.notes,
                    items: cart.map((item) => ({
                        id: item.id,
                        title: item.title,
                        price: item.price,
                        quantity: item.quantity,
                        customNote: item.customNote || ''
                    })),
                    total: getCartTotal,
                    status: 'pending',
                    date: new Date().toLocaleDateString('en-PK', { year: 'numeric', month: 'long', day: 'numeric' }),
                    time: new Date().toLocaleTimeString('en-PK', { hour: '2-digit', minute: '2-digit' })
                };

                try {
                    if (db) {
                        const appId = getActiveAppId();
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('orders')
                            .doc(orderId).set(orderData);
                    } else {
                        setOrders((prev) => [...prev, orderData]);
                    }
                    setCart([]);
                    setCheckoutModal({
                        show: false,
                        name: '',
                        phone: '',
                        address: '',
                        city: 'Karachi',
                        notes: '',
                        verificationCode: '',
                        enteredCode: '',
                        isVerified: false,
                        isCodeSent: false
                    });
                    showAlert("Order Placed Successfully!",
                        `Thank you, ${orderData.name}! Order ID: ${orderId}. We'll craft your custom piece soon.`,
                        "success");
                } catch (err) {
                    showAlert("Order Error", err.message, "error");
                }
            };

            // --- PRODUCT CRUD ---
            const handleSaveProduct = async (e) => {
                e.preventDefault();
                const cleanPrice = Number(productFormModal.price);
                if (!productFormModal.title || isNaN(cleanPrice) || cleanPrice <= 0) {
                    showAlert("Invalid Details", "Please provide a title and valid price.", "error");
                    return;
                }

                const productId = productFormModal.id || "PROD-" + Date.now();
                const productData = {
                    id: productId,
                    title: productFormModal.title,
                    description: productFormModal.description || '',
                    price: cleanPrice,
                    category: productFormModal.category,
                    image: productFormModal.image ||
                        "https://images.unsplash.com/photo-1584992208738-3432be7bac4f?auto=format&fit=crop&w=600&q=80"
                };

                try {
                    if (db) {
                        const appId = getActiveAppId();
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('products')
                            .doc(productId).set(productData);
                    } else {
                        setProducts((prev) => [...prev.filter((p) => p.id !== productId), productData]);
                    }
                    setProductFormModal({ show: false, id: null, title: '', description: '', price: '', category: 'keychain',
                        image: '' });
                    showAlert("Product Saved!", "Your catalog has been updated.", "success");
                } catch (err) {
                    showAlert("Save Error", err.message, "error");
                }
            };

            const handleDeleteProduct = async (id) => {
                try {
                    if (db) {
                        const appId = getActiveAppId();
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('products')
                            .doc(id).delete();
                    } else {
                        setProducts((prev) => prev.filter((p) => p.id !== id));
                    }
                    showAlert("Deleted", "Product removed from catalog.", "info");
                } catch (err) {
                    showAlert("Deletion Error", err.message, "error");
                }
            };

            // --- ORDER STATUS ---
            const handleUpdateOrderStatus = async (orderId, currentStatus) => {
                const stages = ['pending', 'processing', 'shipped', 'delivered'];
                const nextIndex = stages.indexOf(currentStatus) + 1;
                if (nextIndex >= stages.length) return;
                const nextStatus = stages[nextIndex];

                try {
                    if (db) {
                        const appId = getActiveAppId();
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('orders')
                            .doc(orderId).update({ status: nextStatus });
                    } else {
                        setOrders((prev) =>
                            prev.map((o) => (o.id === orderId ? { ...o, status: nextStatus } : o))
                        );
                    }
                    showAlert("Status Advanced", `Order status: ${nextStatus.toUpperCase()}`, "success");
                } catch (err) {
                    showAlert("Update Error", err.message, "error");
                }
            };

            // --- LOGO MANAGEMENT ---
            const handleSaveLogo = async (e) => {
                e.preventDefault();
                const url = logoModal.url.trim();
                if (!url) {
                    showAlert("Invalid URL", "Please enter a valid image URL for your logo.", "error");
                    return;
                }
                try {
                    if (db) {
                        const appId = getActiveAppId();
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').set({ logoUrl: url }, {
                            merge: true
                        });
                        setLogoUrl(url);
                        setLogoModal({ show: false, url: '' });
                        showAlert("Logo Updated!", "Your brand logo has been updated successfully.", "success");
                    } else {
                        showAlert("Database Error", "Firebase is not available.", "error");
                    }
                } catch (err) {
                    showAlert("Save Error", err.message, "error");
                }
            };

            const handleRemoveLogo = async () => {
                try {
                    if (db) {
                        const appId = getActiveAppId();
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').set({ logoUrl: '' }, {
                            merge: true
                        });
                        setLogoUrl('');
                        setLogoModal({ show: false, url: '' });
                        showAlert("Logo Removed", "The logo has been removed.", "info");
                    }
                } catch (err) {
                    showAlert("Error", err.message, "error");
                }
            };

            // --- FILTERED PRODUCTS (memoized) ---
            const filteredProducts = useMemo(() => {
                return (products || []).filter((p) => {
                    if (!p) return false;
                    const title = (p.title || '').toLowerCase();
                    const desc = (p.description || '').toLowerCase();
                    const q = searchQuery.toLowerCase();
                    const matchCategory = selectedCategory === 'all' || p.category === selectedCategory;
                    const matchSearch = title.includes(q) || desc.includes(q);
                    return matchCategory && matchSearch;
                });
            }, [products, selectedCategory, searchQuery]);

            const isAdmin = currentUser && isAdminUser(currentUser);

            // --- RENDER ---
            return (
                <div className="flex-grow flex flex-col justify-between animate-fadeIn">

                    {/* HEADER */}
                    <header className="bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-[#EAE3D5] px-4 py-3 transition-all">
                        <div className="max-w-7xl mx-auto flex items-center justify-between">

                            {/* Brand / Logo */}
                            <div className="flex items-center space-x-3 cursor-pointer" onClick={() => setCurrentView(
                                'storefront')}>
                                {logoUrl ? (
                                    <img src={logoUrl} alt="crochetie Dino Logo" className="logo-img" />
                                ) : (
                                    <span className="font-brand text-4xl tracking-wide text-gray-900">crochetie Dino</span>
                                )}
                            </div>

                            {/* Search */}
                            <div className="hidden md:flex flex-grow max-w-md mx-8 relative">
                                <span className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-[#A19582]">
                                    <i className="fa-solid fa-magnifying-glass"></i>
                                </span>
                                <input
                                    type="text"
                                    placeholder="Search keychains, plushies, home decor..."
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    className="w-full pl-10 pr-4 py-2 border border-[#EAE3D5] rounded-full text-sm bg-[#FAF8F5] focus:ring-1 focus:ring-[#8E806A] focus:outline-none focus:border-[#8E806A]"
                                />
                            </div>

                            {/* Actions */}
                            <div className="flex items-center space-x-4">
                                {isAdmin && (
                                    <button
                                        onClick={() => setCurrentView(currentView === 'admin' ? 'storefront' : 'admin')}
                                        className="text-xs tracking-wider uppercase bg-[#8E806A] text-white px-4 py-2 rounded-full hover:bg-[#766955] transition font-medium"
                                    >
                                        {currentView === 'admin' ? 'Store' : 'Dashboard'}
                                    </button>
                                )}

                                <button onClick={() => setCurrentView('cart')} className="relative p-2 text-gray-700 hover:text-gray-900">
                                    <i className="fa-solid fa-bag-shopping text-xl"></i>
                                    {cart.length > 0 && (
                                        <span className="absolute -top-1 -right-1 bg-[#C78283] text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold">
                                            {cart.reduce((a, b) => a + b.quantity, 0)}
                                        </span>
                                    )}
                                </button>

                                {currentUser ? (
                                    <button onClick={handleLogout} className="text-gray-500 hover:text-red-600 p-2 text-sm" title="Sign Out">
                                        <i className="fa-solid fa-right-from-bracket text-lg"></i>
                                    </button>
                                ) : (
                                    <button onClick={() => setAuthModal({ ...authModal, show: true })} className="p-2 text-gray-700 hover:text-gray-900">
                                        <i className="fa-regular fa-user text-xl"></i>
                                    </button>
                                )}
                            </div>
                        </div>
                    </header>

                    {/* MAIN */}
                    <main className="flex-grow">

                        {/* ===== STOREFRONT ===== */}
                        {currentView === 'storefront' && (
                            <div>
                                {/* Hero */}
                                <div className="bg-[#FAF7F2] py-24 px-4 border-b border-[#EAE3D5]">
                                    <div className="max-w-4xl mx-auto text-center space-y-6">
                                        {logoUrl ? (
                                            <img src={logoUrl} alt="crochetie Dino Logo" className="mx-auto max-h-32 w-auto object-contain" />
                                        ) : (
                                            <h1 className="font-brand text-7xl md:text-8xl text-gray-900 select-none">crochetie Dino</h1>
                                        )}
                                        <p className="font-editorial italic text-2xl text-gray-600 max-w-xl mx-auto">

                                    <button onClick={() => showAlert("Social Access", "Apple Auth is available.", "info")} className="border border-[#EAE3D5] hover:bg-gray-50 py-2.5 rounded-xl text-xs font-medium flex items-center justify-center gap-2">
                                        <i className="fa-brands fa-apple text-gray-900"></i> Apple
                                    </button>
                                </div>

                                <p className="text-center text-xs text-gray-500 pt-2">
                                    {authModal.isLogin ? "Don't have an account?" : "Already have an account?"}
                                    <button type="button" onClick={() => setAuthModal({ ...authModal, isLogin: !authModal
                                            .isLogin })} className="text-[#8E806A] hover:underline font-semibold ml-1">
                                        {authModal.isLogin ? 'Sign Up' : 'Log In'}
                                    </button>
                                </p>
                                <div className="text-center">
                                    <button type="button" onClick={() => setAuthModal({ ...authModal, show: false })} className="text-gray-400 hover:text-gray-600 text-xs">Close</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ===== CHECKOUT MODAL ===== */}
                    {checkoutModal.show && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 overflow-y-auto animate-fadeIn">
                            <div className="bg-white rounded-2xl max-w-md w-full p-8 border border-[#EAE3D5] shadow-xl space-y-6 my-8">
                                <div className="text-center">
                                    <h3 className="font-editorial text-3xl text-gray-950">Pakistan Delivery Setup</h3>
                                    <p className="text-xs text-gray-500 font-light mt-1">Verify your contact details for logistics</p>
                                </div>
                                <form onSubmit={handleVerifyAndSubmitOrder} className="space-y-4">
                                    <div>
                                        <label className="block text-[10px] uppercase tracking-wider text-gray-500 font-semibold mb-1">Full Name</label>
                                        <input type="text" required value={checkoutModal.name} onChange={(e) => setCheckoutModal(
                                            { ...checkoutModal, name: e.target.value })} placeholder="Muhammad Ali" className="w-full text-sm border border-[#EAE3D5] rounded-xl px-4 py-3 bg-[#FAF8F5] focus:outline-none focus:ring-1 focus:ring-[#8E806A]" />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] uppercase tracking-wider text-gray-500 font-semibold mb-1">City</label>
                                        <select value={checkoutModal.city} onChange={(e) => setCheckoutModal({ ...checkoutModal,
                                            city: e.target.value })} className="w-full text-sm border border-[#EAE3D5] rounded-xl px-4 py-3 bg-[#FAF8F5] focus:outline-none focus:ring-1 focus:ring-[#8E806A]">
                                            <option value="Karachi">Karachi (Sindh)</option>
                                            <option value="Lahore">Lahore (Punjab)</option>
                                            <option value="Islamabad">Islamabad (Capital)</option>
                                            <option value="Rawalpindi">Rawalpindi (Punjab)</option>
                                            <option value="Peshawar">Peshawar (KPK)</option>
                                            <option value="Quetta">Quetta (Balochistan)</option>
                                            <option value="Multan">Multan (Punjab)</option>
                                            <option value="Faisalabad">Faisalabad (Punjab)</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] uppercase tracking-wider text-gray-500 font-semibold mb-1">Street Address</label>
                                        <textarea required rows="2" value={checkoutModal.address} onChange={(e) =>
                                            setCheckoutModal({ ...checkoutModal, address: e.target.value })} placeholder="House No, Block, Area" className="w-full text-sm border border-[#EAE3D5] rounded-xl px-4 py-3 bg-[#FAF8F5] focus:outline-none focus:ring-1 focus:ring-[#8E806A]"></textarea>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] uppercase tracking-wider text-gray-500 font-semibold mb-1">Notes (Optional)</label>
                                        <input type="text" value={checkoutModal.notes} onChange={(e) => setCheckoutModal({
                                            ...checkoutModal, notes: e.target.value })} placeholder="Call before arriving, gift wrap, etc." className="w-full text-sm border border-[#EAE3D5] rounded-xl px-4 py-3 bg-[#FAF8F5] focus:outline-none focus:ring-1 focus:ring-[#8E806A]" />
                                    </div>

                                    <div className="border-t border-[#EAE3D5] pt-4 space-y-4">
                                        <div>
                                            <label className="block text-[10px] uppercase tracking-wider text-gray-500 font-semibold mb-1">Phone (for OTP)</label>
                                            <div className="flex gap-2">
                                                <input type="tel" required value={checkoutModal.phone} onChange={(e) =>
                                                    setCheckoutModal({ ...checkoutModal, phone: e.target.value })} placeholder="03211234567" className="flex-grow text-sm border border-[#EAE3D5] rounded-xl px-4 py-3 bg-[#FAF8F5] focus:outline-none focus:ring-1 focus:ring-[#8E806A]" />
                                                <button type="button" onClick={handleSendVerificationCode} className="bg-[#8E806A] text-white px-4 py-2 rounded-xl text-xs font-semibold uppercase tracking-wider hover:bg-[#766955] transition">
                                                    Send Code
                                                </button>
                                            </div>
                                        </div>
                                        {checkoutModal.isCodeSent && (
                                            <div>
                                                <label className="block text-[10px] uppercase tracking-wider text-gray-500 font-semibold mb-1">4-Digit Code</label>
                                                <input type="text" required maxLength="4" value={checkoutModal.enteredCode}
                                                    onChange={(e) => setCheckoutModal({ ...checkoutModal, enteredCode: e
                                                            .target.value })} placeholder="Enter OTP" className="w-full text-center text-lg font-mono tracking-widest border border-[#EAE3D5] rounded-xl px-4 py-2.5 bg-[#FAF8F5] focus:outline-none" />
                                            </div>
                                        )}
                                    </div>

                                    <button type="submit" disabled={!checkoutModal.isCodeSent} className={`w-full py-4 rounded-full text-xs font-bold uppercase tracking-widest transition ${checkoutModal.isCodeSent ?
                                            'bg-emerald-600 hover:bg-emerald-700 text-white shadow' :
                                            'bg-gray-200 text-gray-400 cursor-not-allowed'
                                        }`}>
                                        Complete Order
                                    </button>
                                </form>
                                <div className="text-center">
                                    <button type="button" onClick={() => setCheckoutModal({ ...checkoutModal, show: false })}
                                    className="text-gray-400 hover:text-gray-600 text-xs">Cancel</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ===== PRODUCT FORM MODAL ===== */}
                    {productFormModal.show && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 overflow-y-auto animate-fadeIn">
                            <div className="bg-white rounded-2xl max-w-md w-full p-8 border border-[#EAE3D5] shadow-xl space-y-6 my-8">
                                <h3 className="font-editorial text-3xl text-gray-950 text-center">
                                    {productFormModal.id ? 'Edit Product' : 'New Crochet Masterpiece'}
                                </h3>
                                <form onSubmit={handleSaveProduct} className="space-y-4">
                                    <div>
                                        <label className="block text-[10px] uppercase tracking-wider text-gray-500 font-semibold mb-1">Title</label>
                                        <input type="text" required value={productFormModal.title} onChange={(e) =>
                                            setProductFormModal({ ...productFormModal, title: e.target.value })} placeholder="e.g. Tiny Green Dino Keychain" className="w-full text-sm border border-[#EAE3D5] rounded-xl px-4 py-3 bg-[#FAF8F5] focus:outline-none focus:ring-1 focus:ring-[#8E806A]" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-[10px] uppercase tracking-wider text-gray-500 font-semibold mb-1">Price (PKR)</label>
                                            <input type="number" required value={productFormModal.price} onChange={(e) =>
                                                setProductFormModal({ ...productFormModal, price: e.target.value })} placeholder="1500" className="w-full text-sm border border-[#EAE3D5] rounded-xl px-4 py-3 bg-[#FAF8F5] focus:outline-none focus:ring-1 focus:ring-[#8E806A]" />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] uppercase tracking-wider text-gray-500 font-semibold mb-1">Category</label>
                                            <select value={productFormModal.category} onChange={(e) => setProductFormModal({
                                                ...productFormModal, category: e.target.value })} className="w-full text-sm border border-[#EAE3D5] rounded-xl px-4 py-3 bg-[#FAF8F5] focus:outline-none focus:ring-1 focus:ring-[#8E806A]">
                                                <option value="keychain">Keychain</option>
                                                <option value="toy">Plushie / Toy</option>
                                                <option value="wearable">Wearable</option>
                                                <option value="home decor">Home Decor</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] uppercase tracking-wider text-gray-500 font-semibold mb-1">Image URL</label>
                                        <input type="text" value={productFormModal.image} onChange={(e) => setProductFormModal(
                                            { ...productFormModal, image: e.target.value })} placeholder="https://images.unsplash.com/..." className="w-full text-sm border border-[#EAE3D5] rounded-xl px-4 py-3 bg-[#FAF8F5] focus:outline-none focus:ring-1 focus:ring-[#8E806A]" />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] uppercase tracking-wider text-gray-500 font-semibold mb-1">Description</label>
                                        <textarea rows="3" value={productFormModal.description} onChange={(e) =>
                                            setProductFormModal({ ...productFormModal, description: e.target.value })} placeholder="Describe wool yarn, styling, sizes..." className="w-full text-sm border border-[#EAE3D5] rounded-xl px-4 py-3 bg-[#FAF8F5] focus:outline-none focus:ring-1 focus:ring-[#8E806A]"></textarea>
                                    </div>
                                    <button type="submit" className="w-full bg-[#8E806A] hover:bg-[#766955] text-white py-3.5 rounded-full text-xs font-bold uppercase tracking-widest transition shadow-sm">
                                        Publish Product
                                    </button>
                                </form>
                                <div className="text-center">
                                    <button type="button" onClick={() => setProductFormModal({ ...productFormModal, show: false })} className="text-gray-400 hover:text-gray-600 text-xs">Close</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ===== LOGO MANAGEMENT MODAL ===== */}
                    {logoModal.show && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fadeIn">
                            <div className="bg-white rounded-2xl max-w-md w-full p-8 border border-[#EAE3D5] shadow-xl space-y-6">
                                <div className="text-center">
                                    <h3 className="font-editorial text-3xl text-gray-950">Brand Logo</h3>
                                    <p className="text-xs text-gray-500 font-light mt-1">Enter the URL of your brand logo image</p>
                                </div>
                                <form onSubmit={handleSaveLogo} className="space-y-4">
                                    <div>
                                        <label className="block text-[10px] uppercase tracking-wider text-gray-500 font-semibold mb-1">Logo Image URL</label>
                                        <input type="url" required value={logoModal.url} onChange={(e) => setLogoModal({
                                            ...logoModal, url: e.target.value })} placeholder="https://example.com/logo.png" className="w-full text-sm border border-[#EAE3D5] rounded-xl px-4 py-3 bg-[#FAF8F5] focus:outline-none focus:ring-1 focus:ring-[#8E806A]" />
                                    </div>
                                    {logoModal.url && (
                                        <div className="border border-[#EAE3D5] rounded-xl p-4 bg-[#FAF8F5] text-center">
                                            <p className="text-[10px] uppercase tracking-wider text-gray-400 font-semibold mb-2">Preview</p>
                                            <img src={logoModal.url} alt="Logo preview" className="max-h-20 mx-auto object-contain" onError={(e) => { e.target.style.display =
                                                    'none'; }} />
                                        </div>
                                    )}
                                    <button type="submit" className="w-full bg-[#8E806A] hover:bg-[#766955] text-white py-3.5 rounded-full text-xs font-bold uppercase tracking-widest transition shadow-sm">
                                        Save Logo
                                    </button>
                                </form>
                                <div className="flex justify-center gap-4">
                                    <button type="button" onClick={() => setLogoModal({ show: false, url: '' })} className="text-gray-400 hover:text-gray-600 text-xs">Cancel</button>
                                    {logoUrl && (
                                        <button type="button" onClick={() => { handleRemoveLogo();
                                            setLogoModal({ show: false, url: '' }); }} className="text-red-500 hover:text-red-700 text-xs font-medium">
                                            Remove Logo
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
